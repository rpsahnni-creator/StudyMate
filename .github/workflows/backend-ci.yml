name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: studyapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:testpass@localhost:5432/studyapp_test?sslmode=disable
      VALKEY_ADDR: localhost:6379
      JWT_SECRET: test-secret-ci-minimum-32-characters-long
      ENVIRONMENT: development
      OCR_PROVIDER: stub
      AI_PROVIDER: stub
      EMAIL_PROVIDER: stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run migrations
        run: go run migrations/run_migrations.go
        working-directory: backend

      - name: Run tests
        run: go test ./... -v -timeout 120s
        working-directory: backend

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build API binary
        run: go build -o /tmp/studyapp-api ./cmd/api
        working-directory: backend

      - name: Vet
        run: go vet ./...
        working-directory: backend
